name: harumate
description: "하루메이트 - 발달장애인을 위한 하루 도우미"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  flutter_tts: ^4.0.0
  youtube_player_flutter: ^9.0.3
  path_provider: ^2.1.3
  intl: ^0.19.0
  url_launcher: ^6.2.6
  sqflite: ^2.3.0
  # Design System v3.0
  material_symbols_icons: ^4.2.1001
  # v1.3 B2B
  excel: ^4.0.6
  flutter_local_notifications: ^18.0.1
  share_plus: ^10.1.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/

  # ── Pretendard Variable (한글 최적화 폰트) ──
  # 폰트 파일 경로: assets/fonts/PretendardVariable.ttf
  # 다운로드: https://github.com/orioncactus/pretendard/releases
  # 활성화하려면 파일 받은 후 아래 주석 해제
  # fonts:
  #   - family: Pretendard
  #     fonts:
  #       - asset: assets/fonts/PretendardVariable.ttf
  #         weight: 400
  #       - asset: assets/fonts/PretendardVariable.ttf
  #         weight: 500
  #       - asset: assets/fonts/PretendardVariable.ttf
  #         weight: 600
  #       - asset: assets/fonts/PretendardVariable.ttf
  #         weight: 700
  #       - asset: assets/fonts/PretendardVariable.ttf
  #         weight: 800
