name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hi_buddy_app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --no-fatal-infos

      - name: Unit tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: hi_buddy_app/coverage/lcov.info

  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: hi_buddy_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: flutter pub get
      - name: Build debug APK (서명 키 없이)
        run: flutter build apk --debug --dart-define=API_BASE_URL=https://hibuudy.onrender.com

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: hi_buddy_app/build/app/outputs/flutter-apk/app-debug.apk
